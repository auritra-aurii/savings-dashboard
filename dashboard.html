<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FDR Dashboard" />
  <title>FDR Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-dark:  #1a3a5c;
      --blue-mid:   #2563a8;
      --blue-light: #dbeafe;
      --blue-pale:  #eff6ff;
      --total-bg:   #bfdbfe;
      --nit-bg:     #93c5fd;
      --white:      #ffffff;
      --gray-50:    #f8fafc;
      --gray-100:   #f1f5f9;
      --gray-200:   #e2e8f0;
      --gray-400:   #94a3b8;
      --gray-600:   #475569;
      --gray-800:   #1e293b;
      --text:       #0f172a;
      --green:      #166534;
      --green-bg:   #dcfce7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
      background: var(--gray-100);
      color: var(--text);
      min-height: 100dvh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── HEADER ── */
    .header {
      background: var(--blue-dark);
      color: white;
      padding: 20px 16px 16px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 20px; font-weight: 700; letter-spacing: .01em;
    }
    .sync-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.12);
      border-radius: 99px; padding: 4px 10px;
      font-size: 11px; color: rgba(255,255,255,.8);
    }
    .sync-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── SUMMARY PILLS ── */
    .summary-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .sum-card {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; padding: 10px 12px;
    }
    .sum-label {
      font-size: 10px; font-weight: 500; letter-spacing: .05em;
      text-transform: uppercase; color: rgba(255,255,255,.6);
      margin-bottom: 3px;
    }
    .sum-value {
      font-size: 17px; font-weight: 700; color: #fff;
      letter-spacing: -.01em;
    }
    .sum-value .tk { font-size: 13px; font-weight: 500; margin-right: 1px; opacity: .8; }

    /* ── LAST SYNCED ── */
    .last-sync {
      text-align: center;
      font-size: 11px; color: var(--gray-400);
      padding: 8px 0 4px;
    }

    /* ── TABLE WRAPPER ── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
      font-size: 14px;
      min-width: 700px;  /* allows horizontal scroll on small screens */
    }

    /* Title row */
    .row-title td {
      background: var(--blue-dark);
      color: white;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      padding: 13px;
      letter-spacing: .04em;
    }

    /* Header row */
    thead tr:last-child th {
      background: var(--blue-mid);
      color: white;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      padding: 10px 8px;
      border-right: 1px solid rgba(255,255,255,.15);
      vertical-align: bottom;
      line-height: 1.35;
    }
    thead tr:last-child th:last-child { border-right: none; }

    /* Body rows */
    tbody tr td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--gray-200);
      border-right: 1px solid var(--gray-200);
      text-align: center;
      vertical-align: middle;
      line-height: 1.3;
    }
    tbody tr td:last-child { border-right: none; }
    tbody tr td:first-child { font-weight: 600; text-align: center; }

    /* Alternating rows */
    tbody tr.data-row:nth-child(odd)  td { background: var(--white); }
    tbody tr.data-row:nth-child(even) td { background: var(--blue-pale); }

    /* Hover */
    tbody tr.data-row:hover td { background: var(--blue-light) !important; }

    /* TOTAL row */
    tr.row-total td {
      background: var(--total-bg) !important;
      font-weight: 700;
      font-size: 14px;
      border-top: 2px solid var(--blue-mid);
    }

    /* Sonchoypotro row — slightly different shade */
    tr.row-sonchoypotro td {
      background: var(--gray-100) !important;
      font-style: italic;
    }
    tr.row-sonchoypotro td:first-child { font-style: normal; font-weight: 600; }

    /* NIT TOTAL row */
    tr.row-nit td {
      background: var(--nit-bg) !important;
      font-weight: 700;
      font-size: 15px;
      border-top: 2px solid var(--blue-dark);
      color: var(--blue-dark);
    }

    /* number columns right-align */
    .num { text-align: right !important; font-variant-numeric: tabular-nums; }

    /* ── LOADING / ERROR ── */
    .state-box {
      text-align: center; padding: 60px 20px;
      color: var(--gray-400); font-size: 15px;
      background: white; margin: 16px; border-radius: 12px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--blue-mid);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <h1>📊 FDR's</h1>
    <div class="sync-pill"><div class="sync-dot"></div> Live</div>
  </div>
  <div class="summary-row">
    <div class="sum-card">
      <div class="sum-label">Total Principal</div>
      <div class="sum-value"><span class="tk">৳</span><span id="s-principal">—</span></div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Monthly Income (After Tax)</div>
      <div class="sum-value"><span class="tk">৳</span><span id="s-monthly">—</span></div>
    </div>
  </div>
</div>

<div id="last-sync" class="last-sync"></div>

<!-- TABLE or STATE -->
<div id="root">
  <div class="state-box"><div class="spinner"></div>Loading your data…</div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// ★ PASTE YOUR GOOGLE SHEET CSV URL BELOW ★
// Format: https://docs.google.com/spreadsheets/d/YOUR_ID/gviz/tq?tqx=out:csv&sheet=YOUR_TAB_NAME
// ─────────────────────────────────────────────────────────
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1yO68AOIsJoX-ffWX7d4XqBTNODaw_mQZNtAYdBu662c/gviz/tq?tqx=out:csv&sheet=APP_FDR";

const REFRESH_MS = 60_000; // refresh every 60 seconds

// Column indices (0-based) — must match your sheet header order exactly
const C = {
  bank:0, date:1, principal:2, rate:3, duration:4,
  input:5, beforeTax:6, afterTax:7, monthlyBefore:8, monthlyAfter:9
};

const HEADERS = [
  "Bank","Date","Principal\nAmount","Interest\nRate","Duration\n(Months)",
  "Interest\nInput","Interest\nBefore Tax","Interest After\nTax Ded. (10%)",
  "Monthly Interest\nBefore Tax","Monthly Interest\nAfter Tax"
];

// Which columns are numeric (right-align + format with commas)
const NUM_COLS = new Set([2,6,7,8,9]);

function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const cols = []; let inQ = false, cur = "";
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function cleanNum(s) {
  const n = parseFloat(String(s||"").replace(/[^0-9.\-]/g,""));
  return isNaN(n) ? 0 : n;
}

function fmtNum(s) {
  const n = cleanNum(s);
  if (n === 0 && !String(s||"").match(/\d/)) return s || "—";
  return n.toLocaleString("en-IN", {minimumFractionDigits:0, maximumFractionDigits:2});
}

function fmtSummary(n) {
  if (n >= 1e7) return (n/1e7).toFixed(2) + " Cr";
  if (n >= 1e5) return (n/1e5).toFixed(2) + " L";
  return n.toLocaleString("en-IN",{maximumFractionDigits:0});
}

function cellVal(val, colIdx) {
  if (NUM_COLS.has(colIdx)) return fmtNum(val);
  // rate column: keep as-is (e.g. 9.35%)
  return val || "—";
}

function render(rows) {
  // Row 0 = headers (skip), row 1 onward = data
  const dataRows = rows.slice(1);

  // Detect special rows by bank/first-col value
  function rowType(r) {
    const b = (r[C.bank]||"").trim().toLowerCase();
    if (b === "total" || b === "নিট মোট" || b.includes("total")) return "total";
    if (b === "sonchoypotro" || b.includes("sanchay") || b.includes("sonchoy")) return "sonchoypotro";
    if (b === "nit total" || b.includes("nit")) return "nit";
    return "data";
  }

  // Summaries from TOTAL or NIT TOTAL row
  let totalPrincipal = 0, totalMonthly = 0;
 for (const r of dataRows) {
    totalPrincipal += cleanNum(r[C.principal]);
    totalMonthly   += cleanNum(r[C.monthlyAfter]);
  }

  document.getElementById("s-principal").textContent = fmtSummary(totalPrincipal);
  document.getElementById("s-monthly").textContent   = fmtSummary(totalMonthly);
  document.getElementById("last-sync").textContent   =
    "Last synced: " + new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});

  // Build table
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";

  const tbl = document.createElement("table");

  // Title row
  tbl.innerHTML = `<thead>
    <tr class="row-title"><td colspan="10">FDR'S</td></tr>
    <tr>${HEADERS.map(h=>`<th>${h.replace(/\n/g,"<br>")}</th>`).join("")}</tr>
  </thead><tbody></tbody>`;

  const tbody = tbl.querySelector("tbody");

  for (const r of dataRows) {
    const type = rowType(r);
    const tr = document.createElement("tr");
    tr.className = type === "data" ? "data-row"
                 : type === "total" ? "row-total"
                 : type === "sonchoypotro" ? "row-sonchoypotro"
                 : "row-nit";

    for (let i = 0; i < 10; i++) {
      const td = document.createElement("td");
      if (NUM_COLS.has(i)) td.className = "num";
      td.textContent = cellVal(r[i], i);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  wrap.appendChild(tbl);
  document.getElementById("root").innerHTML = "";
  document.getElementById("root").appendChild(wrap);
}

async function load() {
  if (SHEET_CSV_URL === "YOUR_CSV_URL_HERE") {
    document.getElementById("root").innerHTML = `
      <div class="state-box">
        <div style="font-size:32px;margin-bottom:12px">⚙️</div>
        <strong>Setup needed</strong><br><br>
        Open <code>dashboard.html</code> in a text editor<br>
        and replace <code>YOUR_CSV_URL_HERE</code><br>with your Google Sheet CSV URL.
      </div>`;
    return;
  }
  try {
    const res = await fetch(SHEET_CSV_URL + "&t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error("Sheet appears empty");
    render(rows);
  } catch(e) {
    console.error(e);
    document.getElementById("root").innerHTML = `
      <div class="state-box">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <strong>Could not load data</strong><br><br>${e.message}<br><br>
        Make sure the sheet is <strong>publicly shared</strong> and the URL is correct.
      </div>`;
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
